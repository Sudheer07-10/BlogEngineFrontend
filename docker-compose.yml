version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Inject the API URL at build time. 
        # You can overwrite this by setting VITE_API_URL in your VPS environment or providing a .env file.
        - VITE_API_URL=${VITE_API_URL:-http://72.61.228.9:9020}
    container_name: vertical_pulse_frontend
    ports:
      - "9010:9010" # Expose port 9010 to the host
    restart: unless-stopped
