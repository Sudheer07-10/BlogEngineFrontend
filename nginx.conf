server {
    listen 8070;
    server_name _;

    # Prevent Nginx from redirecting to port 80 (internal port) 
    # instead of preserving the external port (8070)
    absolute_redirect off;
    port_in_redirect off;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Optional: External API proxying if needed in the future
    # location /api/ {
    #     proxy_pass http://backend:8000/;
    # }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
